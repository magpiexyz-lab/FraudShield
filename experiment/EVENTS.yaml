# EVENTS.yaml — Analytics Event Dictionary (FraudShield)
#
# Generated by /spec from behaviors, hypotheses, and golden_path.
# Rules:
#   1. Every event has funnel_stage: reach|demand|activate|monetize|retain
#   2. Naming: <object>_<action> snake_case
#   3. funnel_stage is the cross-MVP standardization layer

global_properties:
  project_name:
    description: From experiment.yaml `name` field. Identifies which experiment this data belongs to.
    type: string
    required: true
  project_owner:
    description: From experiment.yaml `owner` field. Identifies who owns this experiment.
    type: string
    required: true

events:
  # --- reach ---
  visit_landing:
    funnel_stage: reach
    trigger: User loads the landing page
    properties:
      variant:
        type: string
        required: false
        description: Variant slug from experiment.yaml variants
      gclid:
        type: string
        required: false
        description: Google Click ID — captured from URL params in src/app/layout.tsx and auto-attached as a PostHog super-property to every subsequent event
      click_id:
        type: string
        required: false
        description: Generic click ID alias for cross-channel attribution (currently mirrors gclid for Google Ads)
      utm_source:
        type: string
        required: false
        description: utm_source from URL params — captured pre-hydration in layout.tsx and registered as super-property
      utm_medium:
        type: string
        required: false
        description: utm_medium from URL params
      utm_campaign:
        type: string
        required: false
        description: utm_campaign from URL params
      utm_content:
        type: string
        required: false
        description: utm_content from URL params (used for variant + sitelink attribution)
      utm_term:
        type: string
        required: false
        description: utm_term from URL params (keyword)
  demo_view:
    funnel_stage: reach
    trigger: Visitor opens or runs the live sample-scan demo on the landing page
    properties:
      variant:
        type: string
        required: false
        description: Variant slug from experiment.yaml variants

  # --- demand ---
  cta_click:
    funnel_stage: demand
    trigger: User clicks the primary 'Scan your document' CTA
    properties:
      variant:
        type: string
        required: false
        description: Variant slug from experiment.yaml variants
  api_interest_click:
    funnel_stage: demand
    trigger: An activated user clicks 'Get API access' (fake door) on a scan result
    properties:
      doc_type:
        type: string
        required: false
        description: Document type of the result being viewed (pay_stub | bank_statement | invoice)

  # --- activate ---
  signup_start:
    funnel_stage: activate
    trigger: Signup page mounts / user begins account creation
  signup_complete:
    funnel_stage: activate
    trigger: Account is successfully created and the user lands on the dashboard
  activate:
    funnel_stage: activate
    trigger: User uploads a document and receives their first fraud score
    properties:
      doc_type:
        type: string
        required: true
        description: Document type analyzed (pay_stub | bank_statement | invoice)
      fraud_score:
        type: number
        required: false
        description: Returned fraud score (0-100)

  # --- monetize ---
  checkout_start:
    funnel_stage: monetize
    trigger: User clicks 'Upgrade' and begins Stripe checkout
    requires: [payment]
    properties:
      plan:
        type: string
        required: false
        description: Plan the user is upgrading to
  pay_success:
    funnel_stage: monetize
    trigger: Stripe checkout completes and the user's plan is upgraded
    requires: [payment]
    properties:
      plan:
        type: string
        required: false
        description: Plan purchased
      amount:
        type: number
        required: false
        description: Amount charged in the smallest currency unit

  # --- retain ---
  retain_return:
    funnel_stage: retain
    trigger: A returning user (after 24h) submits another document scan

  feedback_submitted:
    funnel_stage: activate
    trigger: User submits post-activation feedback widget
    properties:
      source:
        type: string
        required: false
        description: "How the user found the product (google, social, friend, other)"
      feedback:
        type: string
        required: false
        description: Free-text feedback from the user
      activation_action:
        type: string
        required: true
        description: What activation action preceded this (from experiment.yaml thesis)
