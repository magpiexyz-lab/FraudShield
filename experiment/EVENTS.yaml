# EVENTS.yaml — Analytics Event Dictionary
#
# All events are sent via the analytics library (see analytics stack file for path).
# Every event automatically includes global_properties.
# Event names are snake_case. Custom events should follow the pattern: <object>_<action>.
#
# Structure: flat map keyed by event name. Each event has:
#   funnel_stage: reach|demand|activate|monetize|retain
#   trigger: when this event fires
#   properties: (optional) typed property definitions
#   requires: (optional) stack dependencies, e.g. [payment]
#   archetypes: (optional) archetype-specific events, e.g. [service]

global_properties:
  project_name:
    description: From experiment.yaml `name` field. Identifies which experiment this data belongs to.
    type: string
    required: true
  project_owner:
    description: From experiment.yaml `owner` field. Identifies who owns this experiment.
    type: string
    required: true

# All properties marked required:true must be included in every track() call for that event.
# Properties marked required:false are optional — include them when the data is available.

events:
  visit_landing:
    funnel_stage: reach
    trigger: User loads the surface page (landing page for web-app, root URL for service, marketing page for CLI)
    properties:
      variant:
        type: string
        required: false
        description: Variant slug from experiment.yaml variants (e.g., "speed"). Absent when no variants defined.
      referrer:
        type: string
        required: false
        description: Document referrer URL (document.referrer)
      utm_source:
        type: string
        required: false
        description: UTM source parameter from URL if present
      utm_medium:
        type: string
        required: false
        description: UTM medium parameter from URL if present
      utm_campaign:
        type: string
        required: false
        description: UTM campaign parameter from URL if present
      gclid:
        type: string
        required: false
        description: Google Click ID from URL if present (for offline conversion matching)
      click_id:
        type: string
        required: false
        description: Channel-specific click identifier (e.g., gclid, twclid, rdt_cid)
      utm_content:
        type: string
        required: false
        description: UTM content parameter from URL (variant attribution and ad creative tracking)

  signup_start:
    funnel_stage: demand
    trigger: User clicks "Sign up" or opens the registration form
    properties:
      method:
        type: string
        required: true
        description: "Signup method: email, google, github"

  signup_complete:
    funnel_stage: demand
    trigger: User successfully creates an account (after email verification if applicable)
    properties:
      method:
        type: string
        required: true
        description: "Signup method: email, google, github"

  activate:
    funnel_stage: activate
    trigger: User completes the core action that delivers first value (defined by experiment.yaml thesis)
    properties:
      action:
        type: string
        required: true
        description: What specific action the user took (e.g., "created_invoice", "sent_message")
      fake_door:
        type: boolean
        required: false
        description: "True when the feature is a Fake Door (intent tracking only, not real integration). Absent or false for real activations."

  retain_return:
    funnel_stage: retain
    trigger: User returns to the app after 24+ hours since last visit
    # See framework stack file's retain_return section for implementation details
    properties:
      days_since_last:
        type: integer
        required: true
        description: Days since previous visit (rounded down)

  # Payment events — only include when stack.payment is present in experiment.yaml
  pay_start:
    funnel_stage: monetize
    requires: [payment]
    trigger: User clicks a payment/subscribe button and enters checkout
    properties:
      plan:
        type: string
        required: true
        description: Plan or product name
      amount_cents:
        type: integer
        required: true
        description: Price in cents (e.g., 999 for $9.99)

  pay_success:
    funnel_stage: monetize
    requires: [payment]
    trigger: Payment confirmed (webhook or redirect callback)
    properties:
      plan:
        type: string
        required: true
        description: Plan or product name
      amount_cents:
        type: integer
        required: true
        description: Price in cents
      provider:
        type: string
        required: true
        description: "Payment provider: stripe, lemonsqueezy"

  # Archetype-specific events
  api_call:
    funnel_stage: reach
    archetypes: [service]
    trigger: A request hits an API endpoint

  command_run:
    funnel_stage: reach
    archetypes: [cli]
    trigger: User executes a CLI command

# Standard vs. custom events:
# For web-app: standard funnel events (visit_landing, signup_start, signup_complete,
# activate) are MANDATORY markers — they must fire at every funnel stage even when
# custom events track the specific user action. Custom events are additive, not
# replacements. Example: a waitlist flow should fire both track("waitlist_signup")
# AND trackSignupComplete({ method: "waitlist" }).
# For CLI/service: only archetype-specific events (command_run, api_call) and
# visit_landing (on the surface page) are baseline. Other funnel events apply only
# when the archetype has the corresponding UX flow (e.g., signup requires auth).
#
# Custom events — add experiment-specific events directly to the events map above.
# Naming convention: <object>_<action> in snake_case (e.g., invoice_created, report_exported)
# Include funnel_stage for each event.
#
# Example:
#   invoice_created:
#     funnel_stage: activate
#     trigger: User creates a new invoice
#     properties:
#       currency:
#         type: string
#         required: true
#         description: Invoice currency code (e.g., USD, EUR)
#       item_count:
#         type: integer
#         required: true
#         description: Number of line items on the invoice
#
# The /change and /distribute skills add events directly to the events map.
