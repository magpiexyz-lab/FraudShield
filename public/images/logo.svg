<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-hidden="true">
  <!-- FraudShield mark: stylized "F" inside a forensic instrument bezel.
       Outer ring = scope/lens, inner bracket-F = the inspection mark.
       Transparent background so the mark adapts to any nav surface. -->
  <defs>
    <linearGradient id="fs-mark-cyan" x1="2" y1="4" x2="30" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5cd6e6"/>
      <stop offset="1" stop-color="#2fa3b6"/>
    </linearGradient>
  </defs>
  <!-- Outer instrument bezel (270° arc with notch at bottom-right) -->
  <path
    d="M 16 3 A 13 13 0 1 1 13.4 28.74"
    stroke="url(#fs-mark-cyan)"
    stroke-width="2"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Forensic crosshair tick at bottom-right of the bezel -->
  <circle cx="25.5" cy="22" r="1.6" fill="url(#fs-mark-cyan)"/>
  <!-- Stylized "F": vertical stem, top arm, mid arm.
       Squared caps + slight signal-cyan tint = instrument readout feel. -->
  <path
    d="M 10.5 9 L 10.5 24 M 10.5 9 L 21.5 9 M 10.5 16 L 18 16"
    stroke="url(#fs-mark-cyan)"
    stroke-width="2.6"
    stroke-linecap="square"
    fill="none"
  />
</svg>
