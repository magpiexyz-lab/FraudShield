# ----------------------------------------------------------------------------
# Budget — Phase 1: $30/day × 7 days = $210 total. Adjust after Day 5 review.
# ----------------------------------------------------------------------------

budget:
  daily_budget_cents: 3000      # $30/day USD
  total_budget_cents: 21000     # $210 over 7 days
  duration_days: 7
  bidding_strategy: manual_cpc

targeting:
  locations:
    - US                         # Primary ICP geography
  languages:
    - en
  networks:
    search: true                 # Google Search ONLY
    search_partners: false       # Disabled — wastes budget on low-intent partner sites
    display: false               # Disabled — Phase 1 is search-only

# ----------------------------------------------------------------------------
# Conversion tracking — uses gclid super-property set in src/app/layout.tsx.
# PostHog's `activate` event fires when the user receives their first fraud
# score; that's our primary conversion. `signup_complete` is a soft conversion.
# ----------------------------------------------------------------------------

conversions:
  primary_action: activate         # First scan delivered
  secondary_actions:
    - signup_complete              # Account created
  import_method: posthog_webhook
  attribution_window_days: 30
  notes: |
    PostHog captures gclid from URL params via the pre-hydration script in
    src/app/layout.tsx and registers it as a super-property. Every subsequent
    event — including activate — automatically carries gclid. Wire PostHog's
    Google Ads Conversion Tracking integration after Phase 1 setup; until then,
    conversions can be imported manually via the Google Ads UI by uploading a
    CSV of (gclid, conversion_time, conversion_name) tuples exported from PostHog.

# ----------------------------------------------------------------------------
# Guardrails — hard limits that auto-pause campaigns when violated.
# ----------------------------------------------------------------------------

guardrails:
  max_cpc_cents: 400               # $4.00 max bid per keyword (Phase 1 ceiling)
  min_daily_clicks: 3              # Below this for 2 days → broaden keywords
  auto_pause_rules:
    - condition: "daily_spend_cents > daily_budget_cents * 1.2"
      action: "pause_campaign"
      reason: "Daily spend exceeded budget by 20%"
    - condition: "ctr < 0.005 AND impressions > 1000"
      action: "pause_ad_group"
      reason: "CTR below 0.5% after 1000 impressions — copy is failing"
    - condition: "cost_per_click_cents > 800"
      action: "pause_keyword"
      reason: "CPC exceeded 2x guardrail — keyword is over-competitive"

# ----------------------------------------------------------------------------
# Thresholds — what success looks like for this Phase 1 campaign.
# Derived from h-01 (>5% CTA conversion), h-07 (paid demand), h-09 (gap),
# h-10 (reachable ICP). These map to the pending hypotheses validation step.
# ----------------------------------------------------------------------------

thresholds:
  expected_clicks: 70              # $210 / ~$3 avg CPC
  expected_signups: 4              # 5-6% landing → signup (industry baseline for B2B SaaS Phase 1)
  expected_activations: 2          # ~50% signup → first scan
  go_signal: |
    >= 2 activations in 7 days from any single variant with CPC < $5
    AND CTR >= 1.5% on at least one ad group
    → Continue to Phase 2 (extend 14 days, scale budget 2x on winning variant)
  no_go_signal: |
    0 activations after 7 days at full budget spend
    OR CTR < 0.5% across all ad groups after 1000 impressions
    → Pause campaign, reassess messaging or ICP definition before re-launching

# ----------------------------------------------------------------------------
# Pre-flight checklist — verify each item before un-pausing the campaign.
# ----------------------------------------------------------------------------

pre_flight:
  - id: campaign_paused
    description: "Campaign status is PAUSED in Google Ads UI"
    auto_check: false

  - id: pagespeed_mobile_70
    description: "Landing page PageSpeed mobile score >= 70"
    auto_check: false
    note: "PageSpeed quota was exhausted at config-gen time; verify manually at https://pagespeed.web.dev/"

  - id: ad_approval
    description: "All 6 RSAs (2 per ad group × 3 ad groups) approved by Google"
    auto_check: false
    note: "Allow 24-48 hours for Google review"

  - id: conversion_tracking_verified
    description: "Test conversion fired end-to-end (click ad preview → land → signup → upload doc → check PostHog for activate event with gclid property)"
    auto_check: false

  - id: negative_keywords_added
    description: "50 universal + 12 variant-specific negatives loaded"
    auto_check: false

  - id: utm_final_urls
    description: "Each ad group's final URL has utm_source=google, utm_medium=cpc, utm_campaign=fraudshield-search-v1, utm_content={variant}"
    auto_check: true
    note: "Verified in this config file at write time"

  - id: gclid_capture
    description: "Landing page captures gclid into PostHog session_entry_gclid super-property"
    auto_check: true
    note: "Verified — src/app/layout.tsx pre-hydration script + analytics.ts register()"

  - id: daily_budget_matches
    description: "daily_budget_cents = total_budget_cents / duration_days (3000 = 21000 / 7)"
    auto_check: true
    note: "Verified — matches at config write time"

# ----------------------------------------------------------------------------
# Phase 1 monitoring schedule
# ----------------------------------------------------------------------------

monitoring:
  daily_checks:
    - "Impressions: < 50/day after day 2 → switch zero-impression keywords to Broad Match"
    - "CTR: < 1% after 500 impressions → revise ad copy"
    - "Avg CPC: > 2x max_cpc → lower bids or pause expensive keywords"
  day_3_review:
    - "Search Terms Report — add irrelevant terms to negative_keywords"
  day_4_review:
    - "0 conversions after 50% budget spent → verify gclid is reaching activate event in PostHog"
  day_7_review:
    - "Hit go_signal or no_go_signal? Either way, run /distribute --phase 2 to extend or pause"
