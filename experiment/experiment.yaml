# --- 3. Behaviors ---
behaviors:
  - id: b-01
    hypothesis_id: h-01
    pages: [landing]
    given: "A small lender, landlord, or gig-platform reviewer visits the FraudShield landing page"
    when: "They read the value proposition and see the primary CTA"
    then: "They click 'Scan your document' (>5% of visitors)"
    tests:
      - "Landing page renders the primary CTA button"
      - "Clicking the CTA navigates to signup"
      - "cta_click event fires with the variant slug"
    level: 1
  - id: b-02
    hypothesis_id: h-02
    pages: [landing]
    given: "A visitor with document-review pain is on the landing page"
    when: "They open the live sample-scan demo and view a sample document flagged with a fraud score"
    then: "They engage the demo (>35% of visitors) and see how the forensic signals are explained"
    tests:
      - "Sample-scan demo widget renders a fraud score and signal breakdown"
      - "demo_view event fires when the demo is opened or run"
    level: 1
  - id: b-03
    hypothesis_id: h-01
    pages: [signup, dashboard]
    given: "A visitor clicks the CTA"
    when: "They fill in email and password and submit"
    then: "An account is created and they land on the dashboard"
    tests:
      - "Signup form validates email and password input"
      - "User is redirected to the dashboard after signup"
      - "signup_complete event fires"
    level: 2
  - id: b-04
    hypothesis_id: h-03
    pages: [dashboard, scan-result]
    given: "A signed-up user is on the dashboard"
    when: "They upload a pay stub, bank statement, or invoice and submit it for analysis"
    then: "FraudShield runs metadata forensics, cross-document checks, and template matching and returns a fraud score in seconds"
    tests:
      - "Upload accepts PDF and image files and rejects unsupported types"
      - "Scan result renders a 0-100 fraud score with a per-signal breakdown"
      - "activate event fires when the first fraud score is delivered"
    level: 2
  - id: b-05
    hypothesis_id: h-06
    pages: [scan-result]
    given: "A user is viewing a completed fraud-score result"
    when: "They click 'Get API access' (fake door)"
    then: "They see a waitlist capture confirming integration interest"
    tests:
      - "API access CTA is visible on the result page"
      - "Clicking it fires api_interest_click and shows the waitlist capture"
    level: 2
  - id: b-06
    hypothesis_id: h-04
    pages: [pricing, scan-result]
    given: "A user has used all of their free scans"
    when: "They click 'Upgrade' and complete Stripe checkout"
    then: "Their plan is upgraded and additional scan quota is unlocked"
    tests:
      - "Free-scan limit prompt appears after the free quota is exhausted"
      - "Stripe checkout redirects back to a confirmation state"
      - "pay_success event fires on completed checkout"
    level: 3
  - id: b-07
    actor: system
    trigger: "stripe webhook checkout.session.completed"
    hypothesis_id: h-04
    given: "A Stripe checkout session completes"
    when: "The webhook is received"
    then: "The user's subscription is marked active and their scan quota is increased"
    tests:
      - "subscriptions table row is set to status='active' for the user"
      - "User scan quota reflects the paid plan"
    level: 3
  - id: b-08
    hypothesis_id: h-05
    pages: [dashboard, scan-result]
    given: "A user has run at least one scan"
    when: "They return within 14 days and submit another document"
    then: "A second fraud score is delivered and the return is recorded"
    tests:
      - "A returning user can run another scan from the dashboard"
      - "retain_return event fires on the second scan"
    level: 3

# --- 4. Journey ---
golden_path:
  - step: "Visit landing page"
    event: visit_landing
    page: landing
  - step: "Click 'Scan your document'"
    event: cta_click
    page: landing
  - step: "Create account (email + password)"
    event: signup_complete
    page: signup
  - step: "Upload a document and receive a fraud score"
    event: activate
    page: scan-result
target_clicks: 4

