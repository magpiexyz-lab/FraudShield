# ads.yaml — Google Ads campaign config for FraudShield (Phase 1)
#
# Generated by /distribute, channel: google-ads, phase: 1.
# Follows the Standardized Phase 1 Playbook in .claude/stacks/distribution/google-ads.md.
#
# Campaign goal: validate hypotheses h-01 (CTR), h-07 (paid demand exists), h-09 (gap
# for small operators), h-10 (ICP reachable) on real Google Search traffic.
#
# Manual steps after this config is approved:
#   1. Sign in to ads.google.com with the FraudShield Google account
#   2. Create a new Search campaign (status: PAUSED)
#   3. Apply the structure below — one ad group per variant, 2 RSAs per ad group
#   4. Add the 50 universal negative keywords + the 12 variant-specific negatives
#   5. Configure offline conversion import via gclid (PostHog → Google Ads sync)
#   6. Run pre-flight checklist (see end of file) before un-pausing

