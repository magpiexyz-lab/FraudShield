# experiment.yaml — FraudShield
# Generated by /spec. Source of truth for what to build.

# --- 1. Identity ---
name: fraudshield
owner: magpie                  # Used as project_owner in analytics.
type: web-app
level: 3                       # Full MVP: auth + payments + complete features
status: draft
quality: production

# --- 2. Intent ---
description: |
  Small lenders, landlords, gig platforms, and small employers are being hit by a
  2025 explosion in AI-generated document fraud — fake pay stubs, bank statements,
  and invoices that anyone can produce in seconds from sub-$10 templates. Enterprise
  tools (Inscribe, Findigs) only serve big banks at quote-based pricing, leaving small
  operators with nothing affordable. FraudShield is a self-serve detection dashboard +
  API where they upload a document and get a forensic fraud score in seconds — using
  metadata forensics, cross-document checks, and a known-fraud-template database.

thesis: "If small lenders, landlords, and gig platforms can upload a document and get a trustworthy fraud score in seconds at an affordable self-serve price, then 8%+ of activated users will convert to a paid plan within 2 weeks, as measured by Stripe checkout completions"

target_user: "Small/regional lenders, MCA brokers, independent landlords and property managers, gig-platform trust teams, and SMB finance/AP staff who manually review pay stubs, bank statements, and invoices and have no affordable fraud-detection tool"

distribution: |
  Post in r/Landlord, r/PropertyManagement, r/smallbusiness, and MCA/lending broker forums.
  LinkedIn outreach to small-lender underwriters and property managers.
  Targeted Google/Reddit ads against "fake pay stub" / "verify bank statement" intent.
  Cold outreach to 50 gig-platform trust & safety leads.

